<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinTool CORS Bypass</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <h1>CORS Bypass</h1>
        <p class="subtitle">개발/디버깅용. 기본값은 꺼짐입니다.</p>
      </header>

      <section class="card">
        <div class="row">
          <div class="info">
            <div class="label">응답에 ACAO: * 추가</div>
            <div class="desc" id="status-text">꺼짐</div>
          </div>
          <label class="toggle">
            <input id="cors-toggle" type="checkbox" />
            <span class="toggle-track"></span>
          </label>
        </div>
      </section>

      <section class="notes">
        <p>켜면 브라우저 전역 응답에 CORS 헤더를 붙입니다.</p>
        <p>credentials(쿠키 포함) 요청은 <code>*</code>와 함께 동작하지 않을 수 있습니다.</p>
        <p>아이콘 배지 <strong>CORS</strong>(주황)이 켜짐 상태입니다.</p>
      </section>
    </main>
    <script src="panel.js"></script>
  </body>
</html>
